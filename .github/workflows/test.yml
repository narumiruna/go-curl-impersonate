name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: sh ./scripts/check-fingerprint-fixtures.sh
      - run: go test ./...
      - run: go test -tags=integration ./...
      - run: go test -race ./...
