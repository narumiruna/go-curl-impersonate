name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release-linux-amd64:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: true
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Resolve release tag
        id: version
        run: |
          set -euo pipefail
          tag="$GITHUB_REF_NAME"
          if ! printf '%s\n' "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Release tags must match vMAJOR.MINOR.PATCH, got: $tag"
            exit 1
          fi
          git fetch --tags --force
          git rev-parse -q --verify "refs/tags/$tag" >/dev/null
          git checkout --detach "$tag"
          git submodule update --init --recursive
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Release tag: $tag"

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run Go checks
        run: |
          set -euo pipefail
          sh ./scripts/check-fingerprint-fixtures.sh
          go test ./...
          go test -tags=integration ./...
          go test -race ./...

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            autotools-dev \
            build-essential \
            bzip2 \
            ca-certificates \
            cmake \
            curl \
            libnss3 \
            libtool \
            mercurial \
            nghttp2-server \
            ninja-build \
            nss-plugin-pem \
            pkg-config \
            python3-pip \
            python3-yaml \
            unzip \
            xz-utils \
            zlib1g-dev

      - name: Build curl-impersonate
        run: sh ./scripts/build-curl-impersonate.sh "$RUNNER_TEMP/curl-impersonate-local"
        env:
          CURL_IMPERSONATE_BUILD_DIR: ${{ runner.temp }}/curl-impersonate-build

      - name: Check native Go backend
        run: sh ./scripts/check-native.sh "$RUNNER_TEMP/curl-impersonate-local"

      - name: Check Chrome fingerprint
        run: /usr/bin/python3 scripts/check-fingerprint.py --profile chrome
        env:
          PKG_CONFIG_PATH: ${{ runner.temp }}/curl-impersonate-local/lib/pkgconfig
          LD_LIBRARY_PATH: ${{ runner.temp }}/curl-impersonate-local/lib

      - name: Check Firefox fingerprint
        run: /usr/bin/python3 scripts/check-fingerprint.py --profile firefox
        env:
          PKG_CONFIG_PATH: ${{ runner.temp }}/curl-impersonate-local/lib/pkgconfig
          LD_LIBRARY_PATH: ${{ runner.temp }}/curl-impersonate-local/lib

      - name: Smoke released Go module
        run: sh ./scripts/smoke-external-module.sh "$RUNNER_TEMP/curl-impersonate-local"
        env:
          GO_CURL_IMPERSONATE_MODULE_VERSION: ${{ steps.version.outputs.tag }}
          GOPROXY: direct

      - name: Prototype runtime loader
        run: sh ./scripts/prototype-runtime-loader.sh "$RUNNER_TEMP/curl-impersonate-local"
        env:
          GO_CURL_IMPERSONATE_MODULE_VERSION: ${{ steps.version.outputs.tag }}
          GOPROXY: direct

      - name: Package native bundle
        run: sh ./scripts/package-native-bundle.sh "$RUNNER_TEMP/curl-impersonate-local" dist

      - uses: actions/upload-artifact@v6
        with:
          name: go-curl-impersonate-native-linux-amd64
          path: |
            dist/go-curl-impersonate-native-linux-amd64.tar.gz
            dist/go-curl-impersonate-native-linux-amd64.tar.gz.sha256
          if-no-files-found: error

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" \
              dist/go-curl-impersonate-native-linux-amd64.tar.gz \
              dist/go-curl-impersonate-native-linux-amd64.tar.gz.sha256 \
              --clobber
          else
            gh release create "$RELEASE_TAG" \
              dist/go-curl-impersonate-native-linux-amd64.tar.gz \
              dist/go-curl-impersonate-native-linux-amd64.tar.gz.sha256 \
              --verify-tag \
              --title "$RELEASE_TAG" \
              --generate-notes
          fi

      - name: Write summary
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          {
            echo "## Release"
            echo
            echo "Published release \`$RELEASE_TAG\` with the Linux amd64 native bundle."
          } >> "$GITHUB_STEP_SUMMARY"
